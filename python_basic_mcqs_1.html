<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Python Basic MCQs - Shri Ram Education</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  body { font-family: Arial, sans-serif; background:#f4f7fb; margin:0; padding:0; }
  .container { max-width:900px; margin:auto; background:#fff; padding:20px; border-radius:10px; box-shadow:0 0 10px rgba(0,0,0,0.1); }
  h1 { text-align:center; color:#2c3e50; }
  h2 { text-align:center; color:#555; }
  #timer { text-align:center; font-size:20px; font-weight:bold; color:#e74c3c; margin:15px 0; }
  .question { margin-bottom:20px; padding:15px; border-radius:8px; background:#f9fbff; }
  .question h3 { font-size:18px; }
  label { font-size:16px; display:block; margin:5px 0; cursor:pointer; }
  input[type="text"] { width:100%; padding:10px; margin:10px 0; font-size:16px; }
  button { width:100%; padding:12px; font-size:18px; background:#3498db; color:#fff; border:none; border-radius:6px; cursor:pointer; }
  button:hover { background:#2980b9; }
</style>
</head>
<body>

<div class="container">
  <h1>Python Basic MCQs</h1>
  <h2>Shri Ram Education</h2>

  <input type="text" id="studentName" placeholder="Enter Student Name">
  <input type="text" id="rollNo" placeholder="Enter Roll No">

  <div id="timer"></div>

  <div id="questions"></div>

  <button id="submitBtn">Submit & Download PDF</button>
</div>

<script>
const { jsPDF } = window.jspdf;

const questions = [
  { q:`Predict the output for the following code:\n\na = 10\nb = 5\nprint(a + b)`, options:["105","15","10 5","Error"], answer:1 },
  { q:`Predict the output for the following code:\n\na = "10"\nb = "5"\nprint(a + b)`, options:["15","105","Error","10 5"], answer:1 },
  { q:`Predict the output for the following code:\n\nprint(10 + 5 * 2)`, options:["30","20","25","40"], answer:1 },
  { q:`Predict the output for the following code:\n\nprint((10 + 5) * 2)`, options:["30","20","25","40"], answer:0 },
  { q:`Predict the output for the following code:\n\nx = 7\ny = 2\nprint(x / y)`, options:["3","3.5","3.0","Error"], answer:1 },
  { q:`Predict the output for the following code:\n\nx = 7\ny = 2\nprint(x // y)`, options:["3","3.5","4","Error"], answer:0 },
  { q:`Predict the output for the following code:\n\nprint(10 % 3)`, options:["1","3","0","Error"], answer:0 },
  { q:`Predict the output for the following code:\n\na = 5\na += 3\nprint(a)`, options:["5","3","8","Error"], answer:2 },
  { q:`Predict the output for the following code:\n\na = 5\na =+ 3\nprint(a)`, options:["8","5","3","Error"], answer:2 },
  { q:`Which function is used to take input from the user?`, options:["print()","input()","len()","type()"], answer:1 },

  { q:`Which operator is used for floor division?`, options:["/","//","%","**"], answer:1 },
  { q:`Which operator returns the remainder?`, options:["/","%","//","**"], answer:1 },
  { q:`Which operator is used for power?`, options:["^","**","//","%"], answer:1 },
  { q:`Which converts a string to integer?`, options:["str()","int()","float()","type()"], answer:1 },
  { q:`Predict the output for the following code:\n\nprint("5" * 3)`, options:["15","555","Error","5 5 5"], answer:1 },

  { q:`Predict the output for the following code:\n\nprint("5" + 3)`, options:["53","8","Error","5 3"], answer:2 },
  { q:`Predict the output for the following code:\n\nprint(len("Python"))`, options:["5","6","7","Error"], answer:1 },
  { q:`Predict the output for the following code:\n\nprint(9 // 2)`, options:["4","4.5","5","Error"], answer:0 },
  { q:`Which is a valid variable name?`, options:["1num","num_1","num-1","num 1"], answer:1 },
  { q:`Predict the output for the following code:\n\na = 3\nb = 4\nc = a * b\nprint(c)`, options:["7","12","34","Error"], answer:1 },

  { q:`Predict the output for the following code:\n\nx = 10\nx -= 4\nprint(x)`, options:["6","14","4","Error"], answer:0 },
  { q:`Predict the output for the following code:\n\nx = 10\nx =- 4\nprint(x)`, options:["6","-4","4","Error"], answer:1 },
  { q:`Predict the output for the following code:\n\nprint(int(3.7))`, options:["3","4","3.7","Error"], answer:0 },
  { q:`Predict the output for the following code:\n\nprint(float(5))`, options:["5","5.0","Error","0.5"], answer:1 },
  { q:`Predict the output for the following code:\n\nprint(str(10) + str(5))`, options:["15","105","Error","10 5"], answer:1 },

  { q:`Predict the output for the following code:\n\nprint(8 % 5)`, options:["1","3","5","Error"], answer:1 },
  { q:`Predict the output for the following code:\n\nprint(2 ** 3)`, options:["6","8","9","Error"], answer:1 },
  { q:`Predict the output for the following code:\n\nprint(4 + 6 / 2)`, options:["5","7","10","Error"], answer:1 },
  { q:`Predict the output for the following code:\n\nprint((4 + 6) / 2)`, options:["5","7","10","Error"], answer:0 },
  { q:`What is the output type of input()?`, options:["int","float","str","bool"], answer:2 },

  { q:`Which statement is correct?`, options:["input() returns int","input() returns str","input() returns float","input() returns bool"], answer:1 },
  { q:`Which of these will cause an error?`, options:["print(5+2)","print('5'+'2')","print('5'+2)","print(5*2)"], answer:2 },
  { q:`Which is used to convert input to integer?`, options:["int(input())","input(int())","str(input())","float(input())"], answer:0 },
  { q:`Which operator has the highest precedence?`, options:["+", "*", "**", "//"], answer:2 },
  { q:`Predict the output for the following code:\n\nx = 5\ny = 2\nz = x * y + 1\nprint(z)`, options:["11","15","13","Error"], answer:0 },

  { q:`Predict the output for the following code:\n\nprint(18 // 4)`, options:["4","4.5","5","Error"], answer:0 },
  { q:`Predict the output for the following code:\n\nprint(18 / 4)`, options:["4","4.5","5","Error"], answer:1 },
  { q:`Predict the output for the following code:\n\nprint(18 % 4)`, options:["1","2","4","Error"], answer:1 },
  { q:`Predict the output for the following code:\n\nprint("Hi" + "5")`, options:["Hi5","Hi 5","Error","5Hi"], answer:0 },
  { q:`Predict the output for the following code:\n\nprint("Hi" * 2)`, options:["HiHi","Hi 2","Error","2Hi"], answer:0 },

  { q:`Predict the output for the following code:\n\nprint("3" * 4)`, options:["12","3333","Error","34"], answer:1 },
  { q:`Predict the output for the following code:\n\nprint(5 + int("2"))`, options:["7","52","Error","3"], answer:0 },
  { q:`Predict the output for the following code:\n\nprint(int("2") + int("3"))`, options:["5","23","Error","6"], answer:0 },
  { q:`Predict the output for the following code:\n\nprint(int("5.0"))`, options:["5","5.0","Error","0"], answer:2 },
  { q:`Which of these is invalid?`, options:["a=5","_a=5","2a=5","a_2=5"], answer:2 },

  { q:`Which operator is used for assignment?`, options:["=","==","+=","-="], answer:0 },
  { q:`Which is the result of 7 + 3 * 2?`, options:["20","13","17","Error"], answer:1 },
  { q:`Which is the result of (7 + 3) * 2?`, options:["20","13","17","Error"], answer:0 },
  { q:`Which statement is valid?`, options:["a,b = 5","a,b = 5,6","a = 5,6","a = 5 b = 6"], answer:1 },
  { q:`Predict the output for the following code:\n\na = 2\nb = 3\nprint(a ** b)`, options:["6","8","9","Error"], answer:1 },

  { q:`Predict the output for the following code:\n\nprint(0 // 3)`, options:["0","Error","Infinity","0.0"], answer:0 },
  { q:`Predict the output for the following code:\n\nprint(0 % 3)`, options:["0","3","Error","1"], answer:0 },
  { q:`Which of these is correct?`, options:["a = input()","a = input","a == input()","a := input()"], answer:0 },
  { q:`Which will convert input to float?`, options:["float(input())","input(float())","str(input())","int(input())"], answer:0 },
  { q:`Which operator is evaluated first?`, options:["+", "*", "-", "/"], answer:1 }
];

const totalTime = 60 * 60;
let timeLeft = totalTime;
let timerInterval;

function startTimer() {
  timerInterval = setInterval(() => {
    const min = Math.floor(timeLeft / 60);
    const sec = timeLeft % 60;
    document.getElementById("timer").innerText = `Time Left: ${min}:${sec.toString().padStart(2,'0')}`;
    if (timeLeft <= 0) {
      clearInterval(timerInterval);
      alert("Time is up! Auto submitting...");
      submitQuiz();
    }
    timeLeft--;
  }, 1000);
}

function renderQuestions() {
  const container = document.getElementById("questions");
  questions.forEach((q, i) => {
    const div = document.createElement("div");
    div.className = "question";
    div.innerHTML = `<h3>Q${i+1}. ${q.q.replace(/\n/g,"<br>")}</h3>` +
      q.options.map((o, idx) => `
        <label>
          <input type="radio" name="q${i}" value="${idx}"> ${o}
        </label>
      `).join("");
    container.appendChild(div);
  });
}

function submitQuiz() {
  clearInterval(timerInterval);

  const name = document.getElementById("studentName").value || "Not Provided";
  const roll = document.getElementById("rollNo").value || "Not Provided";

  let score = 0;
  let resultText = "";

  questions.forEach((q, i) => {
    const selected = document.querySelector(`input[name="q${i}"]:checked`);
    const userAns = selected ? q.options[selected.value] : "Not Attempted";
    const correctAns = q.options[q.answer];
    if (selected && Number(selected.value) === q.answer) score++;

    resultText += `Q${i+1}: ${q.q}\n`;
    resultText += `Your Answer: ${userAns}\n`;
    resultText += `Correct Answer: ${correctAns}\n\n\n`;
  });

  generatePDF(name, roll, score, resultText);
}

function generatePDF(name, roll, score, resultText) {
  const doc = new jsPDF();
  let y = 20;
  const pageHeight = doc.internal.pageSize.height;

  doc.setFontSize(16);
  doc.text("Python Basic MCQs", 105, y, { align:"center" }); y += 8;
  doc.text("Shri Ram Education", 105, y, { align:"center" }); y += 10;

  doc.setFontSize(12);
  doc.text(`Student Name: ${name}`, 10, y); y+=6;
  doc.text(`Roll No: ${roll}`, 10, y); y+=6;
  doc.text(`Score: ${score} / ${questions.length}`, 10, y); y+=10;

  const lines = doc.splitTextToSize(resultText, 180);

  lines.forEach(line => {
    if (y > pageHeight - 20) {
      doc.addPage();
      y = 20;
    }
    doc.text(line, 10, y);
    y += 7; // space between lines
  });

  doc.save(`${name}_Python_Basic_MCQ_Result.pdf`);
}


document.getElementById("submitBtn").addEventListener("click", submitQuiz);
renderQuestions();
startTimer();
</script>

</body>
</html>
